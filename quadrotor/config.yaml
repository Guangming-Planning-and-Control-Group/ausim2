controller:
  kx: 0.6
  kv: 0.4
  kR: 6.0
  kw: 1.0
  torque_scale: 0.001

goal:
  position: [0.0, 0.0, 0.3]
  heading: [1.0, 0.0, 0.0]

trajectory:
  wait_time: 1.5
  height: 0.3
  radius: 0.5
  speed_hz: 0.3
