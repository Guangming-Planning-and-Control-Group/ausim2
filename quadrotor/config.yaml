model:
  scene_xml: ../assets/crazyfile/scene.xml

simulation:
  duration: 0.0
  dt: 0.001
  print_interval: 0.5
  use_circular_trajectory: false

viewer:
  enabled: true
  fallback_to_headless: false
  mjui_enabled: false
  width: 1920
  height: 1080
  vsync: true
  render_fps: 120.0
