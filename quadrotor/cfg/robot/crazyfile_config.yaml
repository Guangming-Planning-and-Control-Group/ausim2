robot:
  count: 1

identity:
  vehicle_id: cf2
  namespace: /uav1
  frame_prefix: uav1

model:
  scene_xml: ../../../assets/crazyfile/scene.xml
  body_name: cf2
  aircraft_forward_axis: [1.0, 0.0, 0.0]

bindings:
  actuators:
    motor_names: [motor1, motor2, motor3, motor4]
  state:
    gyro_sensor: body_gyro
    accel_sensor: body_linacc
    quat_sensor: body_quat

vehicle:
  mass: 0.033
  thrust_coefficient: 3.25e-4
  drag_coefficient: 7.9379e-6
  arm_length: 0.0325
  max_thrust: 0.1573
  max_torque: 0.003842
  max_speed_krpm: 22.0

controller:
  rate_hz: 250.0
  kx: 0.6
  kv: 0.4
  kR: 6.0
  kw: 1.0
  torque_scale: 0.001

interfaces:
  cmd_vel_topic: cmd_vel
  joy_cmd_vel_topic: /joy/cmd_vel
  odom_topic: odom
  imu_topic: imu/data
  clock_topic: /clock
  joy_action_services:
    - { service: /joy/action1, event: takeoff }
    - { service: /joy/action2, event: land }
    - { service: /joy/action3, event: reset }
    - { service: /joy/action4, event: estop }
  robot_mode_topic: teleop/mode

mode_machine: ../teleop/quadrotor_default.yaml

frames:
  odom: odom
  base: base_link
  imu: base_link

sensors:
  - name: front_camera
    type: camera
    enabled: true
    frame_id: camera_link
    topic: camera/image_raw
    rate_hz: 30.0
    depth:
      enabled: true
