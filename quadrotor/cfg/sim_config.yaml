robot_config: robot/crazyfile_config.yaml

simulation:
  duration: 0.0
  dt: 0.002
  print_interval: 0.0
  control_mode: 1
  example_mode: 0
  track_camera_name: free

viewer:
  enabled: true
  fallback_to_headless: false
  mjui_enabled: true
  vsync: true

ros2:
  node_name: sim_bridge
  use_sim_time: true
  publish_rate_hz: 100.0
  command_timeout: 0.5
  publish_tf: true
  publish_clock: true

goal:
  position: [0.0, 0.0, 0.3]
  velocity: [0.5, 0.0, 0.0]
  heading: [1.0, 0.0, 0.0]

trajectory:
  wait_time: 1.5
  height: 0.3
  radius: 0.5
  speed_hz: 0.3
  height_gain: 1.5
